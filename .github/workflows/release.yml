name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Releases and upload assets
  packages: write   # push to GitHub Packages NuGet feed

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  # ── 2. Pack & Publish ─────────────────────────────────────────────────────
  release:
    name: Pack & Publish
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Extract semver from the tag (strips leading 'v')
      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Pack all seven source packages with the tag version
      - name: Pack
        run: |
          for project in \
            src/MonadicSharp.Azure.Core/MonadicSharp.Azure.Core.csproj \
            src/MonadicSharp.Azure.Functions/MonadicSharp.Azure.Functions.csproj \
            src/MonadicSharp.Azure.CosmosDb/MonadicSharp.Azure.CosmosDb.csproj \
            src/MonadicSharp.Azure.Messaging/MonadicSharp.Azure.Messaging.csproj \
            src/MonadicSharp.Azure.Storage/MonadicSharp.Azure.Storage.csproj \
            src/MonadicSharp.Azure.KeyVault/MonadicSharp.Azure.KeyVault.csproj \
            src/MonadicSharp.Azure.OpenAI/MonadicSharp.Azure.OpenAI.csproj; do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output ./nupkgs \
              -p:PackageVersion=${{ steps.version.outputs.VERSION }}
          done

      - name: List packages
        run: ls -lh ./nupkgs/

      # ── GitHub Release with .nupkg assets ───────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MonadicSharp.Azure ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./nupkgs/*.nupkg

      # ── GitHub Packages (NuGet feed) ────────────────────────────────────────
      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/Danny4897/index.json" \
            --name github \
            --username Danny4897 \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source github \
            --skip-duplicate
